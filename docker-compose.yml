services:
  voxgate:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: false
    restart: unless-stopped

# To run multiple instances side by side (e.g. one for direct Claude,
# one forwarding to a custom backend), see the "Multi-instance" section
# in docs/setup.md.
