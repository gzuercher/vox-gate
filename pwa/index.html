<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0a0a0a">
  <title>VoxGate</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.svg">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:wght@300;400&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --border: #2a2a2a;
      --text: #e8e8e8;
      --muted: #666;
      --accent: #c8ff00;
      --accent-dim: rgba(200,255,0,0.12);
      --red: #ff4444;
      --font-mono: 'IBM Plex Mono', monospace;
      --font-sans: 'IBM Plex Sans', sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      gap: 12px;
    }

    .header-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.1em;
      padding: 6px 10px;
      border-radius: 4px;
      cursor: pointer;
      text-transform: uppercase;
      -webkit-tap-highlight-color: transparent;
    }
    .header-btn:hover { border-color: var(--accent); color: var(--accent); }
    .header-btn.muted { color: var(--red); border-color: var(--red); }

    .header-center { flex: 1; text-align: center; }

    .new-conv-btn {
      align-self: center;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.12em;
      padding: 6px 14px;
      border-radius: 4px;
      cursor: pointer;
      text-transform: uppercase;
      -webkit-tap-highlight-color: transparent;
    }
    .new-conv-btn:hover { border-color: var(--accent); color: var(--accent); }

    .logo {
      font-family: var(--font-mono);
      font-size: 13px;
      letter-spacing: 0.15em;
      color: var(--accent);
      text-transform: uppercase;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.3s;
    }
    .status-dot.online { background: var(--accent); }
    .status-dot.error { background: var(--red); }
    .status-dot.sending { background: var(--accent); animation: pulse 1.2s ease infinite; }

    main {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    .message {
      max-width: 88%;
      animation: fadeUp 0.2s ease;
    }
    .message.user { align-self: flex-end; }
    .message.assistant { align-self: flex-start; }

    .message-label {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 5px;
    }
    .message.user .message-label { text-align: right; }

    .message-bubble {
      padding: 12px 16px;
      border-radius: 4px;
      font-size: 15px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .message.user .message-bubble {
      background: var(--accent-dim);
      border: 1px solid rgba(200,255,0,0.2);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 13px;
    }
    .message.assistant .message-bubble {
      background: var(--surface);
      border: 1px solid var(--border);
    }

    .typing .message-bubble::after {
      content: '▋';
      animation: blink 1s step-end infinite;
    }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 12px;
      letter-spacing: 0.05em;
    }

    .empty-hint {
      font-size: 11px;
      opacity: 0.6;
    }

    footer {
      padding: 16px 20px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .transcript-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 10px 14px;
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--muted);
      min-height: 44px;
      line-height: 1.5;
      transition: border-color 0.2s, color 0.2s;
    }
    .transcript-box.active {
      border-color: var(--accent);
      color: var(--text);
    }

    .mic-btn {
      width: 100%;
      height: 64px;
      border: none;
      border-radius: 4px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 13px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .mic-btn:active { transform: scale(0.97); }
    .mic-btn.recording {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
    }
    .mic-btn.recording .mic-icon { animation: pulse 1.2s ease infinite; }

    .mic-icon {
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    :focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      white-space: nowrap;
      border: 0;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
  </style>
</head>
<body>

<header>
  <button class="header-btn" id="langBtn" aria-label="Sprache umschalten">DE-CH</button>
  <div class="header-center">
    <span class="logo" id="logo">VoxGate</span>
  </div>
  <button class="header-btn" id="muteBtn" aria-label="Sprachausgabe stummschalten">🔊</button>
  <div class="status-dot" id="statusDot"></div>
</header>

<main id="messages">
  <div class="empty-state" id="emptyState">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" opacity="0.4">
      <rect x="9" y="2" width="6" height="13" rx="3"/>
      <path d="M5 10 C5 16 19 16 19 10"/><line x1="12" y1="16" x2="12" y2="20"/><line x1="8" y1="20" x2="16" y2="20"/>
    </svg>
    <span>Tippen und sprechen</span>
    <span class="empty-hint">Nochmal tippen = senden</span>
  </div>
</main>

<footer>
  <div class="transcript-box" id="transcriptBox" aria-live="polite">Bereit...</div>
  <button class="mic-btn" id="micBtn" onclick="handleTap()" aria-label="Record and send">
    <span class="mic-icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="9" y="2" width="6" height="13" rx="3"/>
        <path d="M5 10 C5 16 19 16 19 10"/><line x1="12" y1="16" x2="12" y2="20"/><line x1="8" y1="20" x2="16" y2="20"/>
      </svg>
    </span>
    <span id="micLabel">Aufnehmen</span>
  </button>
  <button class="new-conv-btn" id="newConvBtn">Neues Gespräch</button>
</footer>

<script>
  let instanceConfig = { name: 'VoxGate', color: '#c8ff00', lang: 'de-CH', maxLength: 4000 };
  let recognition = null;
  let isRecording = false;
  let currentTranscript = '';
  let finalTranscript = '';
  const SUPPORTED_LANGS = ['de-CH', 'fr-CH'];
  let currentLang = localStorage.getItem('voxLang') || null;
  let muted = localStorage.getItem('voxMuted') === '1';
  let sessionId = sessionStorage.getItem('voxSession');
  if (!sessionId) {
    sessionId = (crypto.randomUUID ? crypto.randomUUID()
      : Date.now() + '-' + Math.random().toString(36).slice(2));
    sessionStorage.setItem('voxSession', sessionId);
  }

  function activeLang() {
    return currentLang || instanceConfig.lang;
  }

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }

  const micBtn = document.getElementById('micBtn');
  const micLabel = document.getElementById('micLabel');
  const transcriptBox = document.getElementById('transcriptBox');
  const messagesEl = document.getElementById('messages');
  const statusDot = document.getElementById('statusDot');
  const logo = document.getElementById('logo');
  const langBtn = document.getElementById('langBtn');
  const muteBtn = document.getElementById('muteBtn');
  const newConvBtn = document.getElementById('newConvBtn');

  function updateLangBtn() {
    langBtn.textContent = activeLang().toUpperCase();
  }

  function updateMuteBtn() {
    muteBtn.textContent = muted ? '🔇' : '🔊';
    muteBtn.classList.toggle('muted', muted);
  }

  langBtn.addEventListener('click', () => {
    const lang = activeLang();
    const idx = SUPPORTED_LANGS.indexOf(lang);
    const next = SUPPORTED_LANGS[(idx + 1) % SUPPORTED_LANGS.length] || SUPPORTED_LANGS[0];
    currentLang = next;
    localStorage.setItem('voxLang', next);
    updateLangBtn();
    if (isRecording) stopRecording();
  });

  muteBtn.addEventListener('click', () => {
    muted = !muted;
    localStorage.setItem('voxMuted', muted ? '1' : '0');
    if (muted && 'speechSynthesis' in window) speechSynthesis.cancel();
    updateMuteBtn();
  });

  newConvBtn.addEventListener('click', () => {
    sessionId = (crypto.randomUUID ? crypto.randomUUID()
      : Date.now() + '-' + Math.random().toString(36).slice(2));
    sessionStorage.setItem('voxSession', sessionId);
    messagesEl.innerHTML = '';
    if ('speechSynthesis' in window) speechSynthesis.cancel();
  });

  function speak(text) {
    if (muted || !('speechSynthesis' in window) || !text) return;
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = activeLang();
    speechSynthesis.speak(u);
  }

  async function loadConfig() {
    try {
      const res = await fetch('/config');
      if (res.ok) {
        instanceConfig = await res.json();
        document.title = instanceConfig.name;
        logo.textContent = instanceConfig.name;
        document.documentElement.style.setProperty('--accent', instanceConfig.color);
        const dimColor = instanceConfig.color + '1f';
        document.documentElement.style.setProperty('--accent-dim', dimColor);
        document.querySelector('meta[name="theme-color"]').content = '#0a0a0a';
      }
    } catch (e) {
      // use defaults
    }
  }

  function setStatus(state) {
    statusDot.className = 'status-dot ' + state;
  }

  function updateTranscript(text, active) {
    transcriptBox.textContent = text || 'Bereit...';
    transcriptBox.className = 'transcript-box' + (active ? ' active' : '');
  }

  function addMessage(role, text) {
    const empty = document.getElementById('emptyState');
    if (empty) empty.remove();

    const div = document.createElement('div');
    div.className = 'message ' + role;
    const label = role === 'user' ? 'Du' : instanceConfig.name;
    div.innerHTML = `
      <div class="message-label">${escapeHtml(label)}</div>
      <div class="message-bubble">${escapeHtml(text)}</div>
    `;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
  }

  function escapeHtml(t) {
    return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function handleTap() {
    if (isRecording) {
      stopAndSend();
    } else {
      startRecording();
    }
  }

  function startRecording() {
    if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
      alert('Web Speech API not supported. Use Chrome.');
      return;
    }

    if ('speechSynthesis' in window) speechSynthesis.cancel();

    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SR();
    recognition.lang = activeLang();
    recognition.continuous = true;
    recognition.interimResults = true;

    finalTranscript = '';
    currentTranscript = '';

    recognition.onstart = () => {
      isRecording = true;
      micBtn.classList.add('recording');
      micLabel.textContent = 'Senden';
      updateTranscript('', true);
      setStatus('online');
    };

    recognition.onresult = (e) => {
      let interim = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        const t = e.results[i][0].transcript;
        if (e.results[i].isFinal) {
          finalTranscript += t + ' ';
        } else {
          interim += t;
        }
      }
      currentTranscript = (finalTranscript + interim).trim();
      updateTranscript(currentTranscript, true);
    };

    recognition.onend = () => {
      if (isRecording) {
        recognition.start();
      }
    };

    recognition.onerror = (e) => {
      if (e.error === 'no-speech') return;
      console.error(e.error);
      stopRecording();
      setStatus('error');
    };

    recognition.start();
  }

  function stopRecording() {
    isRecording = false;
    if (recognition) {
      recognition.onend = null;
      recognition.stop();
    }
    micBtn.classList.remove('recording');
    micLabel.textContent = 'Aufnehmen';
  }

  async function stopAndSend() {
    const text = currentTranscript.trim();
    stopRecording();

    if (!text) {
      updateTranscript('', false);
      return;
    }

    addMessage('user', text);
    currentTranscript = '';
    finalTranscript = '';
    updateTranscript('', false);

    const typingDiv = addMessage('assistant', '');
    typingDiv.classList.add('typing');
    setStatus('sending');

    try {
      const headers = { 'Content-Type': 'application/json' };
      const token = localStorage.getItem('apiToken');
      if (token) headers['Authorization'] = 'Bearer ' + token;

      const res = await fetch('/claude', {
        method: 'POST',
        headers,
        body: JSON.stringify({ text, session_id: sessionId })
      });

      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      const reply = data.response || data.text || JSON.stringify(data);

      typingDiv.classList.remove('typing');
      typingDiv.querySelector('.message-bubble').textContent = reply;
      setStatus('online');
      speak(reply);
    } catch (err) {
      typingDiv.classList.remove('typing');
      typingDiv.querySelector('.message-bubble').textContent = 'Fehler: ' + err.message;
      setStatus('error');
    }

    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  updateLangBtn();
  updateMuteBtn();
  loadConfig().then(updateLangBtn);
  setStatus('');
</script>
</body>
</html>
