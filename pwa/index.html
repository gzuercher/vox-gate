<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0a0a0a">
  <title>VoiceClaude</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.svg">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:wght@300;400&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --border: #2a2a2a;
      --text: #e8e8e8;
      --muted: #666;
      --accent: #c8ff00;
      --accent-dim: rgba(200,255,0,0.12);
      --red: #ff4444;
      --font-mono: 'IBM Plex Mono', monospace;
      --font-sans: 'IBM Plex Sans', sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      font-family: var(--font-mono);
      font-size: 13px;
      letter-spacing: 0.15em;
      color: var(--accent);
      text-transform: uppercase;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.3s;
    }
    .status-dot.online { background: var(--accent); }
    .status-dot.error { background: var(--red); }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    .message {
      max-width: 88%;
      animation: fadeUp 0.2s ease;
    }
    .message.user { align-self: flex-end; }
    .message.assistant { align-self: flex-start; }

    .message-label {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 5px;
    }
    .message.user .message-label { text-align: right; }

    .message-bubble {
      padding: 12px 16px;
      border-radius: 4px;
      font-size: 15px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .message.user .message-bubble {
      background: var(--accent-dim);
      border: 1px solid rgba(200,255,0,0.2);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 13px;
    }
    .message.assistant .message-bubble {
      background: var(--surface);
      border: 1px solid var(--border);
    }

    .typing .message-bubble::after {
      content: '▋';
      animation: blink 1s step-end infinite;
    }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 12px;
      letter-spacing: 0.05em;
    }

    footer {
      padding: 16px 20px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .transcript-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 10px 14px;
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--muted);
      min-height: 44px;
      line-height: 1.5;
      transition: border-color 0.2s, color 0.2s;
    }
    .transcript-box.active {
      border-color: var(--accent);
      color: var(--text);
    }

    .controls {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .mic-btn {
      flex: 1;
      height: 56px;
      border: none;
      border-radius: 4px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .mic-btn:active { transform: scale(0.97); }
    .mic-btn.recording {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
    }
    .mic-btn.recording .mic-icon { animation: pulse 1.2s ease infinite; }

    .send-btn {
      width: 56px;
      height: 56px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--surface);
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .send-btn.ready {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--bg);
    }
    .send-btn:active { transform: scale(0.97); }

    .mic-icon {
      width: 18px;
      height: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Settings panel */
    .settings-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      padding: 4px;
      -webkit-tap-highlight-color: transparent;
    }
    .settings-panel {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 100;
      align-items: flex-end;
    }
    .settings-panel.open { display: flex; }
    .settings-inner {
      width: 100%;
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 24px 20px 32px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .settings-title {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .settings-inner input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 12px 14px;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 13px;
    }
    .settings-inner input:focus {
      outline: none;
      border-color: var(--accent);
    }
    .settings-save {
      height: 48px;
      background: var(--accent);
      border: none;
      border-radius: 4px;
      color: var(--bg);
      font-family: var(--font-mono);
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
    }

    :focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      white-space: nowrap;
      border: 0;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
  </style>
</head>
<body>

<header>
  <span class="logo">VoiceClaude</span>
  <div style="display:flex;align-items:center;gap:12px">
    <div class="status-dot" id="statusDot"></div>
    <button class="settings-btn" onclick="openSettings()" aria-label="Einstellungen">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="12" cy="12" r="3"/><path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
      </svg>
    </button>
  </div>
</header>

<main class="messages" id="messages">
  <div class="empty-state" id="emptyState">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" opacity="0.4">
      <rect x="9" y="2" width="6" height="13" rx="3"/>
      <path d="M5 10 C5 16 19 16 19 10"/><line x1="12" y1="16" x2="12" y2="20"/><line x1="8" y1="20" x2="16" y2="20"/>
    </svg>
    <span>Mikrofon drücken und sprechen</span>
  </div>
</main>

<footer>
  <div class="transcript-box" id="transcriptBox">Bereit...</div>
  <div class="controls">
    <button class="mic-btn" id="micBtn" onclick="toggleRecording()">
      <span class="mic-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="9" y="2" width="6" height="13" rx="3"/>
          <path d="M5 10 C5 16 19 16 19 10"/><line x1="12" y1="16" x2="12" y2="20"/><line x1="8" y1="20" x2="16" y2="20"/>
        </svg>
      </span>
      <span id="micLabel">Aufnehmen</span>
    </button>
    <button class="send-btn" id="sendBtn" onclick="sendTranscript()" disabled>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
</footer>

<!-- Settings Panel -->
<div class="settings-panel" id="settingsPanel" onclick="closeSettingsOutside(event)">
  <div class="settings-inner">
    <span class="settings-title">Einstellungen</span>
    <label class="sr-only" for="serverUrl">Server URL</label>
    <input type="url" id="serverUrl" placeholder="https://your-server.com/prompt" autocomplete="off" spellcheck="false">
    <label class="sr-only" for="apiToken">API Token</label>
    <input type="password" id="apiToken" placeholder="API Token (optional)" autocomplete="off">
    <button class="settings-save" onclick="saveSettings()">Speichern</button>
  </div>
</div>

<script>
  // --- Config ---
  let config = {
    serverUrl: localStorage.getItem('serverUrl') || '/prompt',
    apiToken: localStorage.getItem('apiToken') || ''
  };

  // --- State ---
  let recognition = null;
  let isRecording = false;
  let currentTranscript = '';
  let finalTranscript = '';

  // --- PWA ---
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }

  // --- UI ---
  const micBtn = document.getElementById('micBtn');
  const micLabel = document.getElementById('micLabel');
  const sendBtn = document.getElementById('sendBtn');
  const transcriptBox = document.getElementById('transcriptBox');
  const messagesEl = document.getElementById('messages');
  const emptyState = document.getElementById('emptyState');
  const statusDot = document.getElementById('statusDot');

  function setStatus(state) {
    statusDot.className = 'status-dot ' + state;
  }

  function updateTranscript(text, active) {
    transcriptBox.textContent = text || 'Bereit...';
    transcriptBox.className = 'transcript-box' + (active ? ' active' : '');
    sendBtn.disabled = !text;
    sendBtn.className = 'send-btn' + (text ? ' ready' : '');
  }

  function addMessage(role, text) {
    const empty = document.getElementById('emptyState');
    if (empty) empty.remove();

    const div = document.createElement('div');
    div.className = 'message ' + role;
    div.innerHTML = `
      <div class="message-label">${role === 'user' ? 'Du' : 'Claude'}</div>
      <div class="message-bubble">${escapeHtml(text)}</div>
    `;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
  }

  function escapeHtml(t) {
    return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // --- Speech Recognition ---
  function toggleRecording() {
    if (isRecording) {
      stopRecording();
    } else {
      startRecording();
    }
  }

  function startRecording() {
    if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
      alert('Web Speech API wird in diesem Browser nicht unterstützt. Chrome verwenden.');
      return;
    }

    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SR();
    recognition.lang = 'de-CH';
    recognition.continuous = true;
    recognition.interimResults = true;

    finalTranscript = '';

    recognition.onstart = () => {
      isRecording = true;
      micBtn.classList.add('recording');
      micLabel.textContent = 'Aufnahme läuft';
      updateTranscript('', true);
      setStatus('online');
    };

    recognition.onresult = (e) => {
      let interim = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        const t = e.results[i][0].transcript;
        if (e.results[i].isFinal) {
          finalTranscript += t + ' ';
        } else {
          interim += t;
        }
      }
      currentTranscript = (finalTranscript + interim).trim();
      updateTranscript(currentTranscript, true);
    };

    recognition.onend = () => {
      if (isRecording) {
        // Neustart bei automatischem Stop (Android beendet nach Stille)
        recognition.start();
      }
    };

    recognition.onerror = (e) => {
      if (e.error === 'no-speech') return;
      console.error(e.error);
      stopRecording();
      setStatus('error');
    };

    recognition.start();
  }

  function stopRecording() {
    isRecording = false;
    if (recognition) {
      recognition.onend = null;
      recognition.stop();
    }
    micBtn.classList.remove('recording');
    micLabel.textContent = 'Aufnehmen';
    if (currentTranscript) {
      updateTranscript(currentTranscript, false);
    } else {
      updateTranscript('', false);
    }
    setStatus('');
  }

  // --- Send ---
  async function sendTranscript() {
    const text = currentTranscript.trim();
    if (!text) return;

    if (!config.serverUrl) {
      openSettings();
      return;
    }

    stopRecording();
    addMessage('user', text);
    currentTranscript = '';
    finalTranscript = '';
    updateTranscript('', false);

    // Typing indicator
    const typingDiv = addMessage('assistant', '');
    typingDiv.classList.add('typing');
    setStatus('online');

    try {
      const headers = { 'Content-Type': 'application/json' };
      if (config.apiToken) headers['Authorization'] = 'Bearer ' + config.apiToken;

      const res = await fetch(config.serverUrl, {
        method: 'POST',
        headers,
        body: JSON.stringify({ text })
      });

      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      const reply = data.response || data.text || JSON.stringify(data);

      typingDiv.classList.remove('typing');
      typingDiv.querySelector('.message-bubble').textContent = reply;
      setStatus('online');
    } catch (err) {
      typingDiv.classList.remove('typing');
      typingDiv.querySelector('.message-bubble').textContent = 'Fehler: ' + err.message;
      setStatus('error');
    }

    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  // --- Settings ---
  function openSettings() {
    document.getElementById('serverUrl').value = config.serverUrl;
    document.getElementById('apiToken').value = config.apiToken;
    document.getElementById('settingsPanel').classList.add('open');
  }

  function closeSettingsOutside(e) {
    if (e.target === document.getElementById('settingsPanel')) {
      document.getElementById('settingsPanel').classList.remove('open');
    }
  }

  function saveSettings() {
    config.serverUrl = document.getElementById('serverUrl').value.trim();
    config.apiToken = document.getElementById('apiToken').value.trim();
    localStorage.setItem('serverUrl', config.serverUrl);
    localStorage.setItem('apiToken', config.apiToken);
    document.getElementById('settingsPanel').classList.remove('open');
  }

  // Initial status
  setStatus('');
</script>
</body>
</html>
