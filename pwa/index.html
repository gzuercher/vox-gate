<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <!-- maximum-scale=1 prevents the iOS-PWA "renders zoomed-in by default"
       bug. Users can still adjust system text size via iOS Settings →
       Accessibility, which we honour via -webkit-text-size-adjust:100%. -->
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0a0a0a">
  <title>VoxGate</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Onest:wght@300;400;500;600&display=swap">
  <script src="platform.js"></script>
  <script src="theme.js"></script>
  <script src="debug.js"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <button class="header-btn header-icon-btn" id="menuBtn" data-i18n-aria="headerMenu" aria-label="Menü öffnen" aria-haspopup="true" aria-expanded="false">
    <span class="hamburger" aria-hidden="true">
      <span></span><span></span><span></span>
    </span>
  </button>
  <div class="header-center">
    <button class="logo logo-btn" id="logo" data-i18n-aria="headerToggleAuth" aria-label="Konto wechseln">VoxGate</button>
  </div>
  <div class="status-dot" id="statusDot"></div>
</header>

<div class="menu-overlay" id="menuOverlay" hidden></div>
<aside class="menu-drawer" id="menuDrawer" hidden aria-hidden="true" role="dialog" aria-labelledby="menuTitle">
  <div class="menu-header">
    <h2 class="menu-title" id="menuTitle" data-i18n="menuTitle">Einstellungen</h2>
    <button class="menu-close" id="menuCloseBtn" data-i18n-aria="menuClose" aria-label="Menü schließen">✕</button>
  </div>
  <ul class="menu-list">
    <li class="menu-item menu-item--row">
      <label class="menu-label" data-i18n="menuLanguage" for="langSelect">Sprache</label>
      <select class="menu-select" id="langSelect" data-i18n-aria="headerToggleLang" aria-label="Sprache wählen"></select>
    </li>
    <li class="menu-item menu-item--row">
      <span class="menu-label" data-i18n="menuTheme">Erscheinungsbild</span>
      <div class="menu-segment" id="themeSegment" role="radiogroup" data-i18n-aria="menuThemeAria" aria-label="Erscheinungsbild wählen">
        <button class="menu-segment-btn" type="button" data-theme-value="auto" role="radio" aria-checked="true" data-i18n="themeAuto" data-i18n-aria="themeAuto">Auto</button>
        <button class="menu-segment-btn" type="button" data-theme-value="light" role="radio" aria-checked="false" data-i18n-aria="themeLight" aria-label="Hell">☀</button>
        <button class="menu-segment-btn" type="button" data-theme-value="dark" role="radio" aria-checked="false" data-i18n-aria="themeDark" aria-label="Dunkel">☾</button>
      </div>
    </li>
    <li class="menu-item menu-item--row">
      <label class="menu-label" data-i18n="menuTTS" for="ttsToggle">Sprachausgabe</label>
      <button class="menu-toggle" id="ttsToggle" type="button" role="switch" aria-checked="false" data-i18n-aria="menuTTSToggle" aria-label="Sprachausgabe umschalten">
        <span class="menu-toggle-track"><span class="menu-toggle-thumb"></span></span>
        <span class="menu-toggle-state" id="ttsToggleState" data-i18n="ttsOff">Aus</span>
      </button>
    </li>
    <li class="menu-item">
      <button class="menu-action" id="menuHelpBtn" type="button" data-i18n="menuHelp">Hilfe</button>
    </li>
    <li class="menu-item">
      <button class="menu-action menu-action--danger" id="menuLogoutBtn" type="button" data-i18n="logout">Abmelden</button>
    </li>
  </ul>
  <p class="menu-footer" id="menuUserLine" hidden></p>
</aside>

<div class="help-overlay" id="helpOverlay" hidden role="dialog" aria-modal="true" aria-labelledby="helpTitle">
  <div class="help-card">
    <div class="help-header">
      <h2 class="help-title" id="helpTitle" data-i18n="helpTitle">Hilfe</h2>
      <button class="help-close" id="helpCloseBtn" data-i18n-aria="helpClose" aria-label="Hilfe schließen">✕</button>
    </div>
    <div class="help-body" id="helpBody"></div>
  </div>
</div>

<div class="auth-overlay" id="authOverlay" hidden role="dialog" aria-modal="true" aria-labelledby="authTitle">
  <div class="auth-card">
    <h2 id="authTitle" data-i18n="authTitle">Anmelden</h2>
    <p data-i18n="authIntro">Diese Instanz ist privat. Melde dich mit einem Google-Konto an, das vom Betreiber freigeschaltet wurde.</p>
    <div id="googleSignInButton" class="auth-google-btn"></div>
    <p class="auth-error" id="authError" hidden></p>
    <p class="auth-hint" data-i18n="authHint">Anmeldung erfolgt direkt bei Google. VoxGate erhält nur deine E-Mail-Adresse.</p>
    <p class="auth-user" id="authUser" hidden></p>
    <button type="button" id="logoutBtn" class="auth-logout" data-i18n="logout" hidden>Abmelden</button>
  </div>
</div>

<main id="messages">
  <div class="empty-state" id="emptyState">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" opacity="0.4">
      <rect x="9" y="2" width="6" height="13" rx="3"/>
      <path d="M5 10 C5 16 19 16 19 10"/><line x1="12" y1="16" x2="12" y2="20"/><line x1="8" y1="20" x2="16" y2="20"/>
    </svg>
    <span data-i18n="emptyTitle">Tippen und sprechen</span>
    <span class="empty-hint" data-i18n="emptyHint">Nochmal tippen = senden</span>
  </div>
</main>

<footer>
  <div class="transcript-row">
    <div class="transcript-box" id="transcriptBox" aria-live="polite" spellcheck="false" contenteditable="plaintext-only" data-placeholder="Bereit..."></div>
    <button class="icon-action-btn discard-btn" id="discardBtn" type="button" data-i18n-aria="clearAria" aria-label="Text löschen">✕</button>
  </div>
  <div class="attachment-chips" id="attachmentChips" hidden></div>
  <div class="action-row">
    <button class="icon-action-btn camera-btn" id="cameraBtn" type="button" data-i18n-aria="cameraAria" aria-label="Bild anhängen">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M4 7h3l2-2h6l2 2h3a1 1 0 0 1 1 1v10a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V8a1 1 0 0 1 1-1z"/>
        <circle cx="12" cy="13" r="3.5"/>
      </svg>
    </button>
    <input type="file" id="fileInput" accept="image/*" capture="environment" hidden>
    <button class="mic-btn" id="micBtn" data-i18n-aria="micAria" aria-label="Aufnehmen und senden">
      <span class="mic-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="9" y="2" width="6" height="13" rx="3"/>
          <path d="M5 10 C5 16 19 16 19 10"/><line x1="12" y1="16" x2="12" y2="20"/><line x1="8" y1="20" x2="16" y2="20"/>
        </svg>
      </span>
      <span id="micLabel">Aufnehmen</span>
    </button>
  </div>
  <button class="new-conv-btn" id="newConvBtn" data-i18n="newConv">Neues Gespräch</button>
</footer>

<script src="auth.js"></script>
<script src="markdown.js"></script>
<script src="app.js"></script>
</body>
</html>
