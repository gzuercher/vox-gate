<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0a0a0a">
  <title>VoxGate</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.svg">
  <script src="platform.js"></script>
  <script src="debug.js"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <select class="header-btn header-select" id="langSelect" data-i18n-aria="headerToggleLang" aria-label="Sprache wählen"></select>
  <div class="header-center">
    <button class="logo logo-btn" id="logo" data-i18n-aria="headerToggleAuth" aria-label="Konto wechseln">VoxGate</button>
  </div>
  <button class="header-btn" id="muteBtn" data-i18n-aria="headerToggleMute" aria-label="Sprachausgabe stummschalten">🔊</button>
  <div class="status-dot" id="statusDot"></div>
</header>

<div class="auth-overlay" id="authOverlay" hidden role="dialog" aria-modal="true" aria-labelledby="authTitle">
  <div class="auth-card">
    <h2 id="authTitle" data-i18n="authTitle">Anmelden</h2>
    <p data-i18n="authIntro">Diese Instanz ist privat. Melde dich mit einem Google-Konto an, das vom Betreiber freigeschaltet wurde.</p>
    <div id="googleSignInButton" class="auth-google-btn"></div>
    <p class="auth-error" id="authError" hidden></p>
    <p class="auth-hint" data-i18n="authHint">Anmeldung erfolgt direkt bei Google. VoxGate erhält nur deine E-Mail-Adresse.</p>
    <p class="auth-user" id="authUser" hidden></p>
    <button type="button" id="logoutBtn" class="auth-logout" data-i18n="logout" hidden>Abmelden</button>
  </div>
</div>

<main id="messages">
  <div class="empty-state" id="emptyState">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" opacity="0.4">
      <rect x="9" y="2" width="6" height="13" rx="3"/>
      <path d="M5 10 C5 16 19 16 19 10"/><line x1="12" y1="16" x2="12" y2="20"/><line x1="8" y1="20" x2="16" y2="20"/>
    </svg>
    <span data-i18n="emptyTitle">Tippen und sprechen</span>
    <span class="empty-hint" data-i18n="emptyHint">Nochmal tippen = senden</span>
  </div>
</main>

<footer>
  <div class="transcript-box" id="transcriptBox" aria-live="polite" spellcheck="false">Bereit...</div>
  <div class="action-row">
    <button class="discard-btn" id="discardBtn" type="button" data-i18n-aria="discardAria" aria-label="Aufnahme verwerfen" hidden>✕</button>
    <button class="mic-btn" id="micBtn" data-i18n-aria="micAria" aria-label="Aufnehmen und senden">
      <span class="mic-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="9" y="2" width="6" height="13" rx="3"/>
          <path d="M5 10 C5 16 19 16 19 10"/><line x1="12" y1="16" x2="12" y2="20"/><line x1="8" y1="20" x2="16" y2="20"/>
        </svg>
      </span>
      <span id="micLabel">Aufnehmen</span>
    </button>
  </div>
  <button class="new-conv-btn" id="newConvBtn" data-i18n="newConv">Neues Gespräch</button>
</footer>

<script src="auth.js"></script>
<script src="app.js"></script>
</body>
</html>
